<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提默小助手 - 字词默写练习</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主容器 -->
    <div id="app">
        <!-- 页面1: 输入页面 -->
        <section id="input-page" class="page active">
            <div class="container">
                <!-- 标题区域 -->
                <header class="header">
                    <div class="logo">📚</div>
                    <h1>提默小助手</h1>
                    <p class="subtitle">小学生字词默写练习工具</p>
                </header>

                <!-- 词语输入区域 -->
                <div class="input-section">
                    <div class="input-header">
                        <h2>添加词语</h2>
                        <div class="input-methods">
                            <button id="voice-input-btn" class="btn-icon" title="语音输入">
                                <span class="icon">🎤</span>
                                <span class="btn-text">语音</span>
                            </button>
                        </div>
                    </div>

                    <!-- 文字输入 -->
                    <div class="text-input-area">
                        <input 
                            type="text" 
                            id="word-input" 
                            class="word-input" 
                            placeholder="输入词语后按回车添加，支持批量粘贴"
                            autocomplete="off"
                        >
                        <button id="add-word-btn" class="btn btn-primary">添加</button>
                    </div>

                    <!-- 语音输入状态 -->
                    <div id="voice-status" class="voice-status hidden">
                        <div class="voice-indicator">
                            <span class="voice-wave"></span>
                            <span class="voice-wave"></span>
                            <span class="voice-wave"></span>
                        </div>
                        <span class="voice-text">正在聆听...</span>
                        <button id="stop-voice-btn" class="btn btn-small btn-danger">停止</button>
                    </div>

                    <!-- 批量粘贴区域 -->
                    <div class="batch-input-area">
                        <button id="toggle-batch-btn" class="btn btn-link">+ 批量粘贴</button>
                        <div id="batch-input-container" class="batch-container hidden">
                            <textarea 
                                id="batch-input" 
                                class="batch-textarea" 
                                placeholder="粘贴多个词语，用空格、逗号或换行分隔"
                                rows="4"
                            ></textarea>
                            <button id="add-batch-btn" class="btn btn-secondary">批量添加</button>
                        </div>
                    </div>
                </div>

                <!-- 词语列表区域 -->
                <div class="word-list-section">
                    <div class="list-header">
                        <h3>词语列表 <span id="word-count" class="word-count">(0个)</span></h3>
                        <button id="clear-all-btn" class="btn btn-small btn-danger" disabled>清空全部</button>
                    </div>
                    
                    <div id="word-list" class="word-list">
                        <!-- 空状态 -->
                        <div id="empty-state" class="empty-state">
                            <div class="empty-icon">📝</div>
                            <p>还没有添加词语</p>
                            <p class="empty-hint">在上方输入词语开始练习吧</p>
                        </div>
                    </div>
                </div>

                <!-- 设置区域 -->
                <div class="settings-section">
                    <div class="setting-item">
                        <label for="interval-slider">提默间隔时间</label>
                        <div class="slider-container">
                            <input 
                                type="range" 
                                id="interval-slider" 
                                class="slider" 
                                min="3" 
                                max="30" 
                                value="8"
                                step="1"
                            >
                            <span id="interval-value" class="interval-value">8秒</span>
                        </div>
                    </div>

                    <div class="setting-item">
                        <label for="voice-select">朗读语音</label>
                        <select id="voice-select" class="voice-select">
                            <option value="">默认语音</option>
                        </select>
                    </div>

                    <div class="setting-item checkbox-item">
                        <input type="checkbox" id="show-word-toggle" class="checkbox" checked>
                        <label for="show-word-toggle">提默时显示词语（用于跟读练习）</label>
                    </div>
                </div>

                <!-- 开始按钮 -->
                <div class="action-section">
                    <button id="start-btn" class="btn btn-large btn-success" disabled>
                        <span class="btn-icon-large">▶️</span>
                        开始提默
                    </button>
                </div>

                <!-- 词库快捷选择 -->
                <div class="preset-section">
                    <h3>快速词库</h3>
                    <div class="preset-buttons">
                        <button class="btn btn-preset" data-preset="numbers">数字 1-10</button>
                        <button class="btn btn-preset" data-preset="weekdays">星期</button>
                        <button class="btn btn-preset" data-preset="colors">颜色</button>
                        <button class="btn btn-preset" data-preset="animals">动物</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页面2: 提默页面 -->
        <section id="dictation-page" class="page">
            <div class="dictation-container">
                <!-- 顶部进度栏 -->
                <div class="dictation-header">
                    <button id="exit-btn" class="btn btn-icon btn-exit" title="退出">
                        <span>✕</span>
                    </button>
                    <div class="progress-info">
                        <span id="current-index">0</span> / <span id="total-count">-</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- 主要内容区 -->
                <div class="dictation-content">
                    <div id="word-display" class="word-display">
                        <span id="current-word" class="current-word">准备开始</span>
                    </div>
                    
                    <div id="countdown" class="countdown hidden">
                        <span class="countdown-number">3</span>
                    </div>
                </div>

                <!-- 控制按钮 -->
                <div class="dictation-controls">
                    <button id="prev-btn" class="btn btn-control" disabled>
                        <span>⏮</span>
                        <span class="control-label">上一个</span>
                    </button>
                    
                    <button id="play-pause-btn" class="btn btn-control btn-play">
                        <span id="play-icon">⏸</span>
                        <span id="play-label" class="control-label">暂停</span>
                    </button>
                    
                    <button id="repeat-btn" class="btn btn-control">
                        <span>🔁</span>
                        <span class="control-label">重复</span>
                    </button>
                    
                    <button id="next-btn" class="btn btn-control">
                        <span>⏭</span>
                        <span class="control-label">下一个</span>
                    </button>
                </div>

                <!-- 状态提示 -->
                <div id="dictation-status" class="dictation-status">
                    点击播放按钮开始提默
                </div>
            </div>
        </section>

        <!-- 页面3: 检查页面 -->
        <section id="check-page" class="page">
            <div class="container">
                <header class="header">
                    <div class="logo">✅</div>
                    <h1>检查答案</h1>
                    <p class="subtitle">对照正确答案，标记默写结果</p>
                </header>

                <!-- 统计信息 -->
                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">总词数</div>
                    </div>
                    <div class="stat-card stat-correct">
                        <div class="stat-value" id="stat-correct">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-card stat-wrong">
                        <div class="stat-value" id="stat-wrong">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-card stat-rate">
                        <div class="stat-value" id="stat-rate">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>

                <!-- 词语检查列表 -->
                <div class="check-list-section">
                    <h3>词语对照表</h3>
                    <div id="check-list" class="check-list">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="check-actions">
                    <button id="restart-btn" class="btn btn-large btn-primary">
                        <span>🔄</span>
                        再练一次
                    </button>
                    <button id="new-session-btn" class="btn btn-large btn-success">
                        <span>📝</span>
                        新的练习
                    </button>
                </div>
            </div>
        </section>
    </div>

    <!-- 脚本文件 -->
    <script src="js/state.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/recognizer.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
